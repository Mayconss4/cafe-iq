<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CaféIQ</title>
  <style>
    /* ── Reset & tokens ────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --espresso:   #2c1503;
      --coffee:     #6f4e37;
      --caramel:    #c8a97e;
      --cream:      #f5e6d3;
      --parchment:  #fdf6f0;
      --border:     #e2cfbb;
      --text:       #2c1810;
      --text-muted: #8b6e56;
      --err:        #b83232;
      --err-bg:     #fdeaea;
      --shadow-sm:  0 1px 4px rgba(44,21,3,.08);
      --shadow:     0 2px 10px rgba(44,21,3,.11);
      --shadow-md:  0 4px 18px rgba(44,21,3,.13);
      --radius:     12px;
    }

    html, body {
      height: 100%;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--parchment);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    /* ── App shell ─────────────────────────────────────────────────────── */
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
    }

    /* ── Header ────────────────────────────────────────────────────────── */
    header {
      flex-shrink: 0;
      background: var(--espresso);
      display: flex;
      align-items: center;
      gap: 12px;
      height: 58px;
      padding: 0 clamp(16px, 5vw, 48px);
      box-shadow: 0 2px 10px rgba(0,0,0,.32);
      position: relative;
      z-index: 10;
    }

    header .logo { font-size: 1.45rem; line-height: 1; }

    header h1 {
      color: var(--cream);
      font-size: 1.18rem;
      font-weight: 700;
      letter-spacing: .03em;
      white-space: nowrap;
    }
    header h1 span { color: var(--caramel); }

    header .tagline {
      margin-left: auto;
      color: var(--caramel);
      font-size: .76rem;
      opacity: .80;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }

    /* ── Chat panel ────────────────────────────────────────────────────── */
    .chat-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: radial-gradient(ellipse 120% 60% at 50% 0%, #fff8f2 0%, var(--parchment) 68%);
    }

    /* Center all chat content using padding calc — no extra wrapper */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 28px max(20px, calc(50% - 390px));
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
      overscroll-behavior: contain;
    }

    .messages::-webkit-scrollbar { width: 5px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--caramel); border-radius: 99px; }

    /* ── Welcome ───────────────────────────────────────────────────────── */
    .welcome {
      margin: auto;
      text-align: center;
      color: var(--text-muted);
      padding: 48px 32px;
      max-width: 380px;
    }
    .welcome .icon {
      font-size: 3.4rem;
      line-height: 1;
      margin-bottom: 18px;
      filter: drop-shadow(0 3px 8px rgba(111,78,55,.22));
    }
    .welcome h2 {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--coffee);
      margin-bottom: 10px;
      letter-spacing: .01em;
    }
    .welcome p {
      font-size: .9rem;
      line-height: 1.7;
    }
    .welcome .chips {
      margin-top: 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }
    .chip {
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: 99px;
      padding: 6px 14px;
      font-size: .8rem;
      color: var(--coffee);
      font-weight: 500;
      cursor: pointer;
      transition: background .15s, border-color .15s, transform .1s;
      user-select: none;
    }
    .chip:hover {
      background: var(--cream);
      border-color: var(--caramel);
      transform: translateY(-1px);
    }
    .chip:active { transform: scale(.97); }

    /* ── Message bubbles ───────────────────────────────────────────────── */
    .msg { display: flex; flex-direction: column; max-width: 74%; gap: 4px; }
    .msg.user      { align-self: flex-end;   align-items: flex-end; }
    .msg.assistant { align-self: flex-start; align-items: flex-start; }

    .msg .label {
      font-size: .67rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 0 5px;
    }

    .bubble {
      padding: 12px 16px;
      border-radius: var(--radius);
      line-height: 1.65;
      font-size: .92rem;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.user .bubble {
      background: linear-gradient(145deg, #7a5540 0%, var(--espresso) 100%);
      color: #fff;
      border-bottom-right-radius: 3px;
      box-shadow: 0 3px 12px rgba(44,21,3,.28);
    }

    .msg.assistant .bubble {
      background: #fff;
      border: 1px solid var(--border);
      border-bottom-left-radius: 3px;
      box-shadow: var(--shadow-md);
    }

    .msg.error .bubble {
      background: var(--err-bg);
      border: 1px solid #f5c6c6;
      color: var(--err);
      box-shadow: none;
    }

    /* ── Sources ───────────────────────────────────────────────────────── */
    .sources {
      font-size: .69rem;
      color: var(--text-muted);
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      padding: 0 5px;
    }
    .sources span { font-weight: 600; }
    .source-tag {
      background: var(--cream);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 1px 8px;
    }

    /* ── Typing indicator ──────────────────────────────────────────────── */
    .typing .bubble {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 14px 18px;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--caramel);
      animation: bounce .9s infinite ease-in-out;
    }
    .dot:nth-child(2) { animation-delay: .15s; }
    .dot:nth-child(3) { animation-delay: .30s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%           { transform: translateY(-7px); }
    }

    /* ── Input bar ─────────────────────────────────────────────────────── */
    .input-bar {
      flex-shrink: 0;
      padding: 14px max(20px, calc(50% - 390px));
      padding-bottom: max(18px, calc(14px + env(safe-area-inset-bottom)));
      background: var(--parchment);
      border-top: 1px solid var(--border);
      box-shadow: 0 -4px 24px rgba(44,21,3,.07);
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    textarea {
      flex: 1;
      resize: none;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 11px 16px;
      font-family: inherit;
      font-size: .92rem;
      color: var(--text);
      background: #fff;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      max-height: 140px;
      min-height: 46px;
      line-height: 1.55;
      overflow-y: auto;
      box-shadow: var(--shadow-sm);
    }
    textarea:focus {
      border-color: var(--coffee);
      box-shadow: 0 0 0 3px rgba(111,78,55,.13);
    }
    textarea::placeholder { color: var(--text-muted); }

    #send-btn {
      height: 46px;
      padding: 0 22px;
      background: var(--coffee);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .18s, box-shadow .18s, transform .1s;
      white-space: nowrap;
      flex-shrink: 0;
      box-shadow: 0 2px 10px rgba(111,78,55,.30);
      letter-spacing: .02em;
    }
    #send-btn:hover:not(:disabled) {
      background: var(--espresso);
      box-shadow: 0 4px 16px rgba(44,21,3,.36);
    }
    #send-btn:active:not(:disabled) { transform: scale(.97); }
    #send-btn:disabled { background: var(--caramel); cursor: not-allowed; box-shadow: none; }

    /* ── Responsive ────────────────────────────────────────────────────── */
    @media (max-width: 640px) {
      header { padding: 0 16px; height: 52px; }
      header h1 { font-size: 1.05rem; }
      .messages { padding: 16px 14px; gap: 14px; }
      .msg { max-width: 86%; }
      .input-bar {
        padding: 10px 14px;
        padding-bottom: max(14px, calc(8px + env(safe-area-inset-bottom)));
        gap: 8px;
      }
      #send-btn { padding: 0 16px; height: 44px; }
    }

    @media (max-width: 400px) {
      header .tagline { display: none; }
      header h1 { font-size: 1rem; }
      .msg { max-width: 92%; }
      .messages { padding: 12px 10px; }
      textarea { font-size: 1rem; }
      .input-bar {
        padding: 8px 10px;
        padding-bottom: max(10px, calc(6px + env(safe-area-inset-bottom)));
      }
      #send-btn { padding: 0 12px; font-size: .85rem; }
      .welcome .chips { display: none; }
    }
  </style>
</head>
<body>
<div class="app">

  <header>
    <span class="logo">☕</span>
    <h1>Café<span>IQ</span></h1>
    <span class="tagline">Assistente inteligente do mercado de café</span>
  </header>

  <main class="chat-panel">
    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <div class="icon">☕</div>
        <h2>Bem-vindo ao CaféIQ</h2>
        <p>Pergunte sobre cotações em tempo real, clima nas regiões produtoras, safra ou qualquer tema do mercado cafeeiro.</p>
        <div class="chips">
          <span class="chip" data-q="Qual a cotação do café arábica hoje?">📈 Cotação hoje</span>
          <span class="chip" data-q="Como está o clima em Varginha agora?">🌤 Clima em Varginha</span>
          <span class="chip" data-q="Quais as últimas notícias do mercado de café?">📰 Notícias recentes</span>
          <span class="chip" data-q="Como está a safra de café em 2025?">🌱 Safra 2025</span>
        </div>
      </div>
    </div>

    <div class="input-bar">
      <textarea
        id="input"
        rows="1"
        placeholder="Pergunte sobre cotações, clima, safra…"
        maxlength="2000"
      ></textarea>
      <button id="send-btn">Perguntar</button>
    </div>
  </main>

</div>

<script>
  const API_BASE = 'http://localhost:3000';

  const messagesEl = document.getElementById('messages');
  const welcomeEl  = document.getElementById('welcome');
  const inputEl    = document.getElementById('input');
  const sendBtn    = document.getElementById('send-btn');

  /* ── Quick-action chips ───────────────────────────────────────────────── */
  document.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      inputEl.value = chip.dataset.q;
      inputEl.dispatchEvent(new Event('input'));
      sendMessage();
    });
  });

  /* ── Auto-grow textarea ───────────────────────────────────────────────── */
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
  });

  /* ── Send on Enter (Shift+Enter = newline) ────────────────────────────── */
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  sendBtn.addEventListener('click', sendMessage);

  /* ── Chat helpers ─────────────────────────────────────────────────────── */
  function appendMessage(role, text, sources = []) {
    welcomeEl?.remove();

    const wrapper = document.createElement('div');
    wrapper.className = `msg ${role}`;

    const label = document.createElement('div');
    label.className = 'label';
    label.textContent = role === 'user' ? 'Você' : role === 'error' ? 'Erro' : 'CaféIQ';
    wrapper.appendChild(label);

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    wrapper.appendChild(bubble);

    if (sources.length > 0) {
      const src = document.createElement('div');
      src.className = 'sources';
      src.innerHTML = '<span>Fontes:</span> ' +
        sources.filter(Boolean).map(s => `<span class="source-tag">${s}</span>`).join('');
      wrapper.appendChild(src);
    }

    messagesEl.appendChild(wrapper);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return wrapper;
  }

  function showTyping() {
    welcomeEl?.remove();
    const wrapper = document.createElement('div');
    wrapper.className = 'msg assistant typing';
    wrapper.id = 'typing-indicator';

    const label = document.createElement('div');
    label.className = 'label';
    label.textContent = 'CaféIQ';
    wrapper.appendChild(label);

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
    wrapper.appendChild(bubble);

    messagesEl.appendChild(wrapper);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTyping() {
    document.getElementById('typing-indicator')?.remove();
  }

  /* ── Send ─────────────────────────────────────────────────────────────── */
  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    appendMessage('user', text);
    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;
    showTyping();

    try {
      const res = await fetch(`${API_BASE}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ pergunta: text }),
      });
      const data = await res.json();
      removeTyping();

      if (!res.ok) {
        appendMessage('error', `Erro ao processar: ${data.detail ?? data.error ?? `HTTP ${res.status}`}`);
      } else {
        appendMessage('assistant', data.resposta ?? '(sem resposta)', data.fontes ?? []);
      }
    } catch (err) {
      removeTyping();
      appendMessage('error', `Falha de comunicação com o servidor: ${err.message}`);
    } finally {
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  inputEl.focus();
</script>
</body>
</html>
